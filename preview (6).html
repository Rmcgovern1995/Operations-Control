function parseCSV(text){const rows=[];let row=[],val='',q=false;for(let i=0;i<text.length;i++){const c=text[i],n=text[i+1];if(c==='"'){if(q&&n==='"'){val+='"';i++;}else q=!q;}else if(c===','&&!q){row.push(val);val='';}else if((c==='\n'||c==='\r')&&!q){if(c==='\r'&&n==='\n')i++;row.push(val);if(row.some(x=>String(x).trim()!==''))rows.push(row);row=[];val='';}else val+=c;}row.push(val);if(row.some(x=>String(x).trim()!==''))rows.push(row);return rows;}
function normalizeAction(v){const s=String(v||'').trim().toLowerCase();if(['d','delivery','deliver'].includes(s))return 'Delivery';if(['p','pickup','pick up','pick-up','pu'].includes(s))return 'Pickup';if(['exchange','exch','xchange','swap'].includes(s))return 'Exchange';if(['repair','service','r','svc'].includes(s))return 'Repair';if(['eval','evaluation','assess','assessment'].includes(s))return 'Evaluation';return s? 'Unknown':'';}

function isDateMarker(v){return /^\d{1,2}[-\/][a-z]{3,}|^\d{1,2}[-\/]\d{1,2}/i.test(String(v||'').trim());}

function prepareDailyRows(rows,blockIndex=0){const blocks=detectDateBlocks(rows);if(!blocks.length)return {rows,dateLabel:null,blockCount:0,ignoredOutsideBlock:0,blockIndex:-1};const safeIndex=Math.max(0,Math.min(Number(blockIndex)||0,blocks.length-1));const selected=blocks[safeIndex];const headerRows=[];if(rows[0]&&rows[0].join('|').toLowerCase().includes('sales order')) headerRows.push(rows[0]);const blockRows=rows.slice(selected.startIndex,selected.endIndex+1);return {rows:[...headerRows,...blockRows],dateLabel:selected.dateLabel,blockCount:blocks.length,blockIndex:safeIndex,ignoredOutsideBlock:Math.max(0,rows.length-headerRows.length-blockRows.length-1)};}
function analyzeRouteRows(rows,dateLabel=''){

function buildDateBlockSummaries(rows){const blocks=detectDateBlocks(rows);if(!blocks.length){const stats=analyzeRouteRows(rows,'Full File');return [{index:-1,dateLabel:'Full File',startIndex:0,endIndex:rows.length-1,...stats}];}return blocks.map((b,i)=>{const headerRows=[];if(rows[0]&&rows[0].join('|').toLowerCase().includes('sales order'))headerRows.push(rows[0]);const blockRows=[...headerRows,...rows.slice(b.startIndex,b.endIndex+1)];const stats=analyzeRouteRows(blockRows,b.dateLabel);return {index:i,dateLabel:b.dateLabel,startIndex:b.startIndex,endIndex:b.endIndex,...stats};});}

blewrap"><table><tr><th>Town From Route</th><th>Matched Registry Town</th><th>Status</th><th>Latitude</th><th>Longitude</th><th>Confidence</th></tr>${used.map(t=>{const rec=findTownCoordinates(t);return `<tr><td>${esc(t)}</td><td>${rec?esc(rec.town):NA}</td><td>${rec?badge('Ready','green'):badge('Missing','red')}</td><td>${rec?rec.latitude:NA}</td><td>${rec?rec.longitude:NA}</td><td>${rec?esc(rec.confidence):NA}</td></tr>`}).join('')}</table></div></div><div class="panel"><h3>Add / Update Town Coordinate</h3><div class="formgrid"><div class="field"><label>Town</label><input id="newTown"></div><div class="field"><label>State</label><input id="newState" value="NY"></div><div class="field"><label>Latitude</label><input id="newLat"></div><div class="field"><label>Longitude</label><input id="newLon"></div></div><button class="btn primary" style="margin-top:10px" onclick="addTown()">Save Town</button></div>`}
function addTown(){const town=document.getElementById('newTown').value.trim(),st=document.getElementById('newState').value.trim()||'NY',lat=parseFloat(document.getElementById('newLat').value),lon=parseFloat(document.getElementById('newLon').value);if(!town||!isFinite(lat)||!isFinite(lon)){alert('Town, latitude, and longitude are required.');return;}const ex=findTownCoordinates(town);if(ex){ex.latitude=lat;ex.longitude=lon;ex.state=st;ex.confidence='Manual';ex.source='Manual';}else state.townRegistry.push({id:'town_'+Date.now(),town,state:st,latitude:lat,longitude:lon,confidence:'Manual',source:'Manual'});buildDerived();renderAll();}

function closeoutScorecard(){const costs=Object.values(state.routeCosts);const estMiles=sumFinite(costs.map(c=>c.estimatedMiles));const actMiles=sumFinite(costs.map(c=>toNum(c.actualMiles)));const estCost=sumFinite(costs.map(c=>c.estimatedTotalCost));const actCost=sumFinite(costs.map(c=>c.totalCost));const t=totals();const completed=t.completed;const variance=isFinite(actMiles)&&isFinite(estMiles)&&actMiles?actMiles-estMiles:NaN;return {estMiles,actMiles,estCost,actCost,mileageVariance:variance,costVariance:isFinite(actCost)&&isFinite(estCost)?actCost-estCost:NaN,costPerCompletedStop:isFinite(actCost)&&completed?actCost/completed:NaN,milesPerCompletedStop:isFinite(actMiles)&&completed?actMiles/completed:NaN};}
function sumFinite(arr){let has=false,total=0;arr.forEach(v=>{const n=Number(v);if(isFinite(n)){has=true;total+=n;}});return has?total:NaN;}
function calibrationSummary(){const costs=Object.values(state.routeCosts).filter(c=>isFinite(toNum(c.actualMiles))&&isFinite(c.estimatedMiles)&&c.estimatedMiles>0);if(!costs.length)return {status:'Not enough actual mileage data for calibration yet.',recommended:null};const est=sumFinite(costs.map(c=>c.estimatedMiles));const act=sumFinite(costs.map(c=>toNum(c.actualMiles)));const current=Number(state.companyDefaults.mileageRoadFactor)||1.22;const ratio=act/est;const rec=current*ratio;let msg='Road factor is within normal tolerance.';if(ratio>1.15)msg='Actual mileage is materially higher than estimated. Consider increasing the road factor.';if(ratio<0.85)msg='Actual mileage is materially lower than estimated. Consider decreasing the road factor.';return {status:msg,recommended:rec,ratio,actualMiles:act,estimatedMiles:est};}
function renderCloseoutCards(){const s=closeoutScorecard();return renderCards([['Estimated Miles',num(s.estMiles,1),'Town-coordinate plan'],['Actual Miles',num(s.actMiles,1),'From actual/odometer entries'],['Mileage Variance',isFinite(s.mileageVariance)?num(s.mileageVariance,1):NA,'Actual minus estimated'],['Estimated Cost',money(s.estCost),'Planning cost'],['Actual / Final Cost',money(s.actCost),'Closeout cost'],['Cost Variance',money(s.costVariance),'Actual minus estimated'],['Cost / Completed Stop',money(s.costPerCompletedStop),'Final efficiency'],['Miles / Completed Stop',num(s.milesPerCompletedStop,2),'Route density']]);}

function renderCost(){const cal=calibrationSummary();document.getElementById('tab_cost').innerHTML=`<div class="panel"><h3>Actual Route Closeout + Cost Inputs</h3><p class="muted">V1.3 compares the morning estimate against the end-of-day actuals. Enter actual miles directly, or enter odometer start/end and the system will calculate actual miles. Enter actual start/end times or route hours for labor closeout. Default fuel price is ${money(Number(state.companyDefaults.defaultFuelPrice))} per gallon from ${esc(state.companyDefaults.fuelPriceRegion||'Long Island average')} (${esc(state.companyDefaults.fuelPriceSource||'source not set')}, ${esc(state.companyDefaults.fuelPriceAsOf||'date not set')}).</p>${renderCloseoutCards()}</div><div class="panel"><h3>Route-Level Closeout</h3><div class="tablewrap"><table><tr><th>Route</th><th>Status</th><th>Est Miles</th><th>Odom Start</th><th>Odom End</th><th>Actual Miles</th><th>Mileage Var</th><th>Actual Start</th><th>Actual End</th><th>Route Hours</th><th>MPG</th><th>Fuel Price</th><th>Actual Fuel $</th><th>Driver $/Hr</th><th>Helper $/Hr</th><th>Tolls</th><th>Parking</th><th>Misc</th><th>Est Total</th><th>Final Total</th><th>Cost Var</th><th>Cost/Completed Stop</th></tr>${state.routes.map(r=>{const c=state.routeCosts[r.name]||{};const statusColor=c.closeoutStatus==='Closed'?'green':c.closeoutStatus==='Needs Review'?'red':c.closeoutStatus==='Partial Closeout'?'amber':'gray';return `<tr><td>${esc(r.name)} ${c.mileageLimited?badge('Mileage Limited','amber'):badge('Mileage Ready','green')}</td><td>${badge(c.closeoutStatus||'Estimated Only',statusColor)}</td><td>${num(c.estimatedMiles,1)}</td>${['odometerStart','odometerEnd','actualMiles'].map(k=>`<td><input style="width:86px" value="${esc(c[k]??'')}" onchange="updateRouteCost('${esc(r.name)}','${k}',this.value)"></td>`).join('')}<td>${isFinite(c.mileageVariance)?`${num(c.mileageVariance,1)} / ${num(c.mileageVariancePct,1)}%`:NA}</td>${['actualStart','actualEnd'].map(k=>`<td><input type="time" style="width:110px" value="${esc(c[k]??'')}" onchange="updateRouteCost('${esc(r.name)}','${k}',this.value)"></td>`).join('')}<td><input style="width:86px" value="${esc(c.routeHours??'')}" onchange="updateRouteCost('${esc(r.name)}','routeHours',this.value)"></td>${['mpg','fuelPrice','actualFuelCost','driverHourlyRate','helperHourlyRate','tolls','parking','misc'].map(k=>`<td><input style="width:86px" value="${esc(c[k]??'')}" onchange="updateRouteCost('${esc(r.name)}','${k}',this.value)"></td>`).join('')}<td>${money(c.estimatedTotalCost)}</td><td>${money(c.totalCost)}</td><td>${money(c.costVariance)} ${isFinite(c.costVariancePct)?`(${num(c.costVariancePct,1)}%)`:''}</td><td>${money(c.costPerCompletedStop)}</td></tr>`}).join('')}</table></div></div><div class="panel"><h3>Road Factor Calibration</h3><p class="muted">${esc(cal.status)} ${isFinite(cal.recommended)?`Current road factor: ${num(state.companyDefaults.mileageRoadFactor,2)}. Recommended from actuals: ${num(cal.recommended,2)}.`:'Enter actual miles on at least one route to generate a recommendation.'}</p>${isFinite(cal.recommended)?`<button class="btn primary" onclick="state.companyDefaults.mileageRoadFactor=${Number(cal.recommended).toFixed(3)};buildDerived();renderAll()">Apply Recommended Road Factor</button>`:''}</div>`;}

 recommend a new road factor.'}</p><h2>8. Exceptions and Follow-Ups</h2>${exceptionSummaryTable()}<h2>9. Next-Day Action List</h2><ul>${nextActions().map(a=>`<li>${esc(a)}</li>`).join('')}</ul></div>`}
function routeSummaryTable(){return `<div class="tablewrap"><table><tr><th>Route</th><th>Stops</th><th>Completed</th><th>Failed</th><th>Remaining</th><th>Completion</th><th>Status</th></tr>${state.routes.map(r=>{const s=routeStats(r.name);return `<tr><td>${esc(r.name)}</td><td>${s.stops}</td><td>${s.completed}</td><td>${s.failed}</td><td>${s.remaining}</td><td>${pct(s.completion)}</td><td>${esc(s.status)}</td></tr>`}).join('')}</table></div>`}
function invTable(){const inv=invSummary();return `<div class="tablewrap"><table><tr><th>Item</th><th>Delivered</th><th>Picked Up</th><th>Net</th></tr>${inv.map(r=>`<tr><td>${esc(r.item)}</td><td>${r.delivered}</td><td>${r.picked}</td><td>${r.net}</td></tr>`).join('')}</table></div>`}
function pullSummaryTable(){const m={};state.warehousePullList.forEach(p=>m[p.status]=(m[p.status]||0)+1);return `<div class="tablewrap"><table><tr><th>Pull Status</th><th>Count</th></tr>${Object.entries(m).map(([k,v])=>`<tr><td>${esc(k)}</td><td>${v}</td></tr>`).join('')}</table></div>`}
function costSummaryTable(){return `<div class="tablewrap"><table><tr><th>Route</th><th>Closeout Status</th><th>Est Miles</th><th>Actual Miles</th><th>Mileage Var</th><th>Est Cost</th><th>Final Cost</th><th>Cost Var</th><th>Cost/Stop</th><th>Cost/Completed Stop</th><th>Cost/Mile</th><th>Miles/Completed Stop</th></tr>${state.routes.map(r=>{const c=state.routeCosts[r.name]||{};return `<tr><td>${esc(r.name)}</td><td>${esc(c.closeoutStatus||'Estimated Only')}</td><td>${num(c.estimatedMiles,1)}</td><td>${num(toNum(c.actualMiles),1)}</td><td>${isFinite(c.mileageVariance)?`${num(c.mileageVariance,1)} / ${num(c.mileageVariancePct,1)}%`:NA}</td><td>${money(c.estimatedTotalCost)}</td><td>${money(c.totalCost)}</td><td>${money(c.costVariance)} ${isFinite(c.costVariancePct)?`(${num(c.costVariancePct,1)}%)`:''}</td><td>${money(c.costPerStop)}</td><td>${money(c.costPerCompletedStop)}</td><td>${money(c.costPerMile)}</td><td>${num(c.milesPerCompletedStop,2)}</td></tr>`}).join('')}</table></div>`}
function exceptionSummaryTable(){const m={};state.exceptions.filter(e=>e.status!=='Resolved').forEach(e=>m[e.type]=(m[e.type]||0)+1);return `<div class="tablewrap"><table><tr><th>Type</th><th>Open / Reviewed Count</th></tr>${Object.entries(m).map(([k,v])=>`<tr><td>${esc(k)}</td><td>${v}</td></tr>`).join('')}</table></div>`}
function nextActions(){const arr=[];if(state.exceptions.some(e=>e.type==='Missing coordinates'&&e.status!=='Resolved'))arr.push('Review missing town coordinates before the next route import.');if(state.stops.some(s=>s.status==='Failed'))arr.push('Follow up on failed stops and determine whether they need to be rescheduled.');if(state.warehousePullList.some(p=>p.status==='Issue'||p.status==='Not Pulled'))arr.push('Resolve warehouse pull issues before dispatch or closeout.');if(Object.values(state.routeCosts).some(c=>c.closeoutStatus==='Estimated Only'||c.closeoutStatus==='Partial Closeout'))arr.push('Complete route closeout by entering actual mileage or odometer readings plus actual route start/end time.');if(Object.values(state.routeCosts).some(c=>c.closeoutStatus==='Needs Review'))arr.push('Review routes flagged for failed/skipped stops or high mileage variance.');if(Object.values(state.routeCosts).some(c=>!isFinite(c.totalCost)))arr.push('Enter fuel price, route hours, and labor rates for final cost accuracy.');if(state.inventoryMovements.some(m=>m.movementType==='PICKED_UP'))arr.push('Confirm returned pickup inventory was received back into warehouse control.');return arr.length?arr:['No unresolved next-day actions detected from current data.'];}
function renderCloseout(){document.getElementById('tab_closeout').innerHTML=`<div class="panel noPrint"><button class="btn primary" onclick="printCloseoutReport()">Print Closeout Report</button></div><div class="panel" id="closeoutPanel">${closeoutHTML()}</div>`}
function renderExport(){document.getElementById('tab_export').innerHTML=`<div class="panel"><h3>Export Center</h3><div class="toolbar"><button class="btn primary" onclick="exportRoutePackageJSON()">Export Route Package JSON</button><button class="btn" onclick="exportCloseoutTXT()">Export Closeout TXT</button><button class="btn" onclick="exportCloseoutHTML()">Export Closeout HTML</button><button class="btn" onclick="printDriverSheet()">Print Driver Route Sheet</button><button class="btn" onclick="printCloseoutReport()">Print Daily Closeout Report</button></div><p class="muted">Exports include current statuses, cost inputs, exceptions, and inventory movement.</p></div>`}
function routePackage(){return {appVersion:state.appVersion,generatedAt:new Date().toISOString(),companyDefaults:state.companyDefaults,importQA:state.importQA,routes:state.routes,stops:state.stops,inventoryMovements:state.inventoryMovements,warehousePullList:state.warehousePullList,townRegistry:state.townRegistry,routeCosts:state.routeCosts,exceptions:state.exceptions,closeoutSummary:{totals:totals(),inventorySummary:invSummary(),scorecard:closeoutScorecard(),calibration:calibrationSummary(),nextActions:nextActions()}}}
function download(name,type,content){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([content],{type}));a.download=name;document.body.appendChild(a);a.click();setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove();},500)}
function exportRoutePackageJSON(){download('HJ_ROUTE_PACKAGE_V1_4.json','application/json',JSON.stringify(routePackage(),null,2));}
function stripHtml(html){const d=document.createElement('div');d.innerHTML=html;return d.innerText;}
function exportCloseoutTXT(){download('HJ_Daily_Closeout.txt','text/plain',stripHtml(closeoutHTML()));}
function exportCloseoutHTML(){download('HJ_Daily_Closeout.html','text/html','<!doctype html><html><head><meta charset="utf-8"><title>H&J Closeout</title><style>body{font-family:Arial;padding:24px}table{border-collapse:collapse;width:100%}td,th{border:1px solid #ddd;padding:8px;text-align:left}h1{border-bottom:3px solid #C8102E}</style></head><body>'+closeoutHTML()+'</body></html>');}
function printCloseoutReport(){showTab('closeout');document.getElementById('tab_closeout').classList.add('printThis');window.print();}
function printDriverSheet(){showTab('driver');document.getElementById('tab_driver').classList.add('printThis');window.print();}
function saveLocal(){localStorage.setItem('HJ_DailyOps_V1_4',JSON.stringify(routePackage()));alert('Snapshot saved in this browser.');}
function loadLocal(){const raw=localStorage.getItem('HJ_DailyOps_V1_4');if(!raw){alert('No saved snapshot found.');return;}const p=JSON.parse(raw);Object.assign(state,p);renderAll();alert('Snapshot loaded.');}

function renderImport(){
  const qa=state.importQA||{};
  const status = !qa.rowsImported ? badge('No File Imported','gray') : (qa.validStopCount>0 ? (qa.warningCount>0 ? badge('Import Passed With Warnings','amber') : badge('Import Passed','green')) : badge('Import Failed — No Valid Stops Detected','red'));
  const warnings=(qa.warnings||[]).map(w=>`<li>${esc(w)}</li>`).join('') || '<li>No warnings.</li>';
  const errors=(qa.errors||[]).map(e=>`<li>${esc(e)}</li>`).join('') || '<li>No errors.</li>';
  document.getElementById('tab_import').innerHTML=`
    <div class="panel"><h3>Daily Manager Workflow</h3>${workflowStepHTML()}</div>
    <div class="panel">
      <h3>Import Daily Routes</h3>
      <div class="importBox" id="dropZone">
        <p><b>Upload your daily route CSV here.</b></p>
        <p class="muted">The system accepts embedded route starts such as: Pri, Adams, 55021, D, Melville, Commode, 9:00 AM.</p>
        <input id="csvInput" type="file" accept=".csv,text/csv,text/plain" onchange="handleCSVUpload(this.files && this.files[0]); this.value='';">
        <div style="margin-top:12px"><button class="btn primary" onclick="document.getElementById('csvInput').click()">Choose CSV File</button></div>
      </div>
    </div>
    ${pendingImportPreviewHTML()}
    <div class="panel">
      <h3>Import QA ${status}</h3>
      ${renderCards([
        ['File Name',state.importedFileName||NA,'Current source file'],
        ['Route Date',qa.selectedRouteDate||'Not detected','Selected daily block'],
        ['Rows Imported',qa.rowsImported||0,'Raw CSV rows in source file'],
        ['Date Blocks',qa.detectedDateBlocks||0,'Dated route blocks detected'],
        ['Valid Stops',qa.validStopCount||0,'Parsed operational stops'],
        ['Ignored Rows',qa.ignoredRowCount||0,'Blank/header/date rows'],
        ['Standalone Route Markers',qa.routeMarkerCount||0,'Detected marker rows'],
        ['Embedded Route Starts',qa.embeddedRouteStartCount||0,'Route names embedded on stop rows'],
        ['Total Routes Detected',qa.totalDetectedRoutes||0,'Active parsed routes'],
        ['Warnings / Errors',`${qa.warningCount||0} / ${qa.errorCount||0}`,'QA issue counts']
      ])}
      <div class="grid" style="grid-template-columns:1fr 1fr;margin-top:14px">
        <div class="note"><b>Warnings</b><ul>${warnings}</ul></div>
        <div class="note ${qa.errorCount?'bad':'good'}"><b>Errors</b><ul>${errors}</ul></div>
      </div>
    </div>
    <div class="panel">
      <h3>Expected CSV Columns</h3>
      <div class="tablewrap"><table><tr><th>Route / Driver</th><th>Name</th><th>Sales Order</th><th>Action</th><th>Town</th><th>Product</th><th>Expected Time</th><th>Notes</th></tr><tr><td>Pri</td><td>Adams</td><td>55021</td><td>D</td><td>Melville</td><td>Commode</td><td>9:00 AM</td><td></td></tr></table></div>
    </div>`;
  wireDropZone();
}
function wireDropZone(){
  const dz=document.getElementById('dropZone');
  if(!dz || dz.dataset.wired==='1') return;
  dz.dataset.wired='1';
  ['dragenter','dragover'].forEach(ev=>dz.addEventListener(ev,e=>{e.preventDefault();dz.style.borderColor='#C8102E';dz.style.background='#fff5f6';}));
  ['dragleave','drop'].forEach(ev=>dz.addEventListener(ev,e=>{e.preventDefault();dz.style.borderColor='';dz.style.background='';}));
  dz.addEventListener('drop',e=>{const f=e.dataTransfer&&e.dataTransfer.files&&e.dataTransfer.files[0];handleCSVUpload(f);});
}
function handleCSVUpload(file){
  if(!file){alert('No CSV file selected.');return;}
  const reader=new FileReader();
  reader.onerror=()=>alert('Failed to read CSV file. Please save it as a plain .csv file and try again.');
  reader.onload=()=>{
    try{
      const rows=parseCSV(String(reader.result||''));
      state.pendingImport={fileName:file.name||'Imported CSV',rows,blocks:buildDateBlockSummaries(rows),uploadedAt:new Date().toISOString()};
      Object.assign(state.importQA,{rowsImported:rows.length,detectedDateBlocks:state.pendingImport.blocks.length,selectedRouteDate:'Pending selection',warnings:['CSV loaded. Select a daily route block and confirm import.'],errors:[],warningCount:1,errorCount:0,validStopCount:0,ignoredRowCount:0,routeMarkerCount:0,embeddedRouteStartCount:0,totalDetectedRoutes:0});
      state.importedFileName=file.name||'Imported CSV';
      renderAll();
      showTab('import');
    }catch(err){
      console.error(err);
      alert('Failed to load CSV: '+(err&&err.message?err.message:String(err)));
      renderAll();
    }
  };
  reader.readAsText(file);
}
function confirmPendingImport(blockIndex){
  if(!state.pendingImport){alert('No pending CSV import found. Please upload the CSV again.');return;}
  importRows(state.pendingImport.rows,state.pendingImport.fileName,{blockIndex});
}
function renderAll(){
  ensureV11Defaults();
  renderImport();
  renderDefaults();
  renderDashboard();
  renderDispatcher();
  renderPull();
  renderMovement();
  renderTowns();
  renderCost();
  renderDriver();
  renderExceptions();
  renderCloseout();
  renderExport();
}

function resetAll(){if(!confirm('Reset all imported data and statuses?'))return;const towns=state.townRegistry;Object.assign(state,{appVersion:'1.4',importedFileName:null,generatedAt:null,rawRows:[],pendingImport:null,companyDefaults:{warehouseName:'H&J Medical Supplies',warehouseTown:'Melville',warehouseState:'NY',defaultMPG:17,defaultFuelPrice:4.203,fuelPriceRegion:'Nassau-Suffolk AAA Regular',fuelPriceSource:'AAA Gas Prices',fuelPriceAsOf:'2026-04-29',defaultDriverHourlyRate:null,defaultHelperHourlyRate:null,defaultPrepMinutes:30,defaultCloseoutMinutes:30,returnToWarehouse:true,mileageRoadFactor:1.22},importQA:{routeMarkerCount:0,embeddedRouteStartCount:0,totalDetectedRoutes:0,validStopCount:0,ignoredRowCount:0,warningCount:0,errorCount:0,warnings:[],errors:[],rowsImported:0},routes:[],stops:[],inventoryMovements:[],warehousePullList:[],townRegistry:towns,routeCosts:{},exceptions:[]});renderAll();showTab('import');}
init();
</script>
